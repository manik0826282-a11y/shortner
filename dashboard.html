<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkDash — Multi-User URL Shortener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --card: #18181f; --border: #26262f;
    --accent: #6c63ff; --accent2: #ff6584; --green: #4ade80;
    --text: #f0f0f5; --muted: #7070a0;
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── AUTH SCREENS ── */
  .auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 60% 40%, #1a1040 0%, var(--bg) 70%);
  }
  .auth-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 44px 40px; width: 380px; box-shadow: 0 0 60px rgba(108,99,255,0.15);
  }
  .auth-box h1 {
    font-size: 22px; font-weight: 700; margin-bottom: 4px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .auth-box p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .auth-tab {
    flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 600;
    cursor: pointer; background: var(--surface); color: var(--muted); transition: all 0.2s; border: none; font-family: var(--font);
  }
  .auth-tab.active { background: var(--accent); color: #fff; }

  .field-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field-group label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  input[type="text"], input[type="password"], input[type="url"] {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: var(--mono); font-size: 13px; padding: 11px 14px;
    width: 100%; transition: border-color 0.2s; outline: none;
  }
  input:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 11px 20px; border-radius: 10px; border: none; font-family: var(--font);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; border: 1px solid #ff4466; color: #ff4466; }
  .btn-danger:hover { background: #ff446222; }
  .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
  .btn-outline:hover { background: var(--accent); color: #fff; }

  .auth-error { color: var(--accent2); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
  .auth-switch { text-align: center; margin-top: 14px; font-size: 12px; color: var(--muted); }
  .auth-switch a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .auth-switch a:hover { text-decoration: underline; }

  /* ── APP ── */
  #app { display: none; }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px;
    height: 58px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .user-badge {
    background: var(--card); border: 1px solid var(--border); border-radius: 7px;
    padding: 5px 10px; font-size: 12px; color: var(--green); font-family: var(--mono);
  }
  main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  /* Stats bar */
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 600; }
  .stat-value { font-size: 26px; font-weight: 700; font-family: var(--mono); }
  .stat-value.green { color: var(--green); }
  .stat-value.purple { color: var(--accent); }

  /* Create form */
  .create-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 28px; }
  .create-card h2 { font-size: 11px; font-weight: 600; margin-bottom: 18px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .create-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; align-items: end; }
  .slug-wrap {
    display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: border-color 0.2s;
  }
  .slug-wrap:focus-within { border-color: var(--accent); }
  .slug-prefix { padding: 11px 10px 11px 14px; font-size: 12px; color: var(--muted); font-family: var(--mono); white-space: nowrap; border-right: 1px solid var(--border); background: var(--card); }
  .slug-wrap input { border: none; border-radius: 0; flex: 1; padding-left: 10px; }
  .slug-wrap input:focus { border: none; }
  .dice-btn { background: none; border: none; padding: 0 12px; cursor: pointer; font-size: 16px; opacity: 0.5; transition: opacity 0.2s; }
  .dice-btn:hover { opacity: 1; }

  /* Info box */
  .info-box {
    background: #1a1040; border: 1px solid var(--accent); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 24px; font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 10px;
  }
  .info-box .short-url { font-family: var(--mono); color: var(--accent); font-size: 11px; margin-top: 3px; }

  /* Section header */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  #links-container { display: flex; flex-direction: column; gap: 8px; }

  /* Link card */
  .link-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 18px; display: grid; grid-template-columns: 1fr auto; gap: 12px;
    align-items: center; transition: border-color 0.2s; animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .link-card:hover { border-color: #333340; }
  .link-card.editing { border-color: var(--accent); }
  .link-left { overflow: hidden; }
  .link-short { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .short-code { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); cursor: pointer; text-decoration: none; }
  .short-code:hover { text-decoration: underline; color: #a09bff; }
  .copy-toast { font-size: 10px; color: var(--green); opacity: 0; transition: opacity 0.2s; }
  .copy-toast.show { opacity: 1; }
  .link-label { font-size: 11px; color: var(--muted); background: #1e1e2a; border-radius: 4px; padding: 1px 6px; }
  .link-dest { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 500px; }
  .clicks-badge {
    display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono);
    font-size: 11px; color: var(--green); background: #0d2e1a; border-radius: 5px;
    padding: 2px 7px; margin-top: 4px; cursor: pointer;
  }
  .link-actions { display: flex; align-items: center; gap: 6px; }

  /* Edit mode */
  .edit-mode { display: none; margin-top: 12px; }
  .edit-mode.open { display: flex; flex-direction: column; gap: 8px; }
  .edit-mode-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .edit-mode-row { display: flex; gap: 8px; align-items: center; }
  .edit-mode input { flex: 1; font-size: 13px; padding: 10px 14px; min-width: 0; width: 100%; }
  .btn-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 13px; padding: 9px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: var(--font); font-weight: 600; }
  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 0; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Search */
  .search-input { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 12px; padding: 7px 12px; width: 180px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px;
    font-size: 13px; transform: translateY(20px); opacity: 0; transition: all 0.25s;
    z-index: 100; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--accent2); color: var(--accent2); }

  /* Modal */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 480px; max-height: 80vh; overflow-y: auto; }
  .modal h3 { font-size: 15px; margin-bottom: 16px; }
  .click-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .click-row:last-child { border-bottom: none; }
  .flag { font-size: 16px; }
  .click-time { color: var(--muted); font-family: var(--mono); font-size: 11px; margin-left: auto; }

  /* Settings panel */
  .settings-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 28px; display: none; }
  .settings-panel.open { display: block; }
  .settings-panel h2 { font-size: 13px; font-weight: 700; margin-bottom: 16px; }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .create-row-2 { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: 1fr; }
    header { padding: 0 16px; }
    .user-badge { display: none; }
  }
</style>
</head>
<body>

<!-- ── LOGIN / REGISTER ── -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <h1>🔗 LinkDash</h1>
    <p id="auth-subtitle">Sign in to manage your short links</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Worker URL hardcoded — hidden -->
    <input type="hidden" id="worker-url-input" value="https://mtq.youtubebd.workers.dev" />

    <!-- Login fields -->
    <div id="login-fields">
      <div class="field-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="your password" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Login →</button>
    </div>

    <!-- Register fields -->
    <div id="register-fields" style="display:none">
      <div class="field-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="choose_username (a-z, 0-9, _)" autocomplete="username" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="min 6 characters" autocomplete="new-password" />
      </div>
      <div class="field-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-password2" placeholder="repeat password" autocomplete="new-password" />
      </div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account →</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <div class="logo">🔗 <span>LinkDash</span></div>
    <div class="header-right">
      <div class="user-badge" id="user-badge">—</div>
      <button class="btn btn-ghost btn-sm" onclick="toggleSettings()">⚙️</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <!-- Your base URL info -->
    <div class="info-box" id="base-url-info">
      <span>🔗</span>
      <div>
        <div>Your short links will look like:</div>
        <div class="short-url" id="base-url-display">—</div>
      </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settings-panel">
      <h2>⚙️ Account Settings</h2>
      <div class="field-group" style="max-width:320px">
        <label>New Password</label>
        <input type="password" id="new-pass" placeholder="min 6 characters" />
      </div>
      <div class="field-group" style="max-width:320px">
        <label>Confirm New Password</label>
        <input type="password" id="new-pass2" placeholder="repeat new password" />
      </div>
      <button class="btn btn-outline btn-sm" onclick="changePassword()">Update Password</button>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-label">Total Links</div><div class="stat-value purple" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Clicks</div><div class="stat-value green" id="stat-clicks">—</div></div>
      <div class="stat-card"><div class="stat-label">Last Created</div><div class="stat-value" style="font-size:14px;margin-top:4px" id="stat-last">—</div></div>
    </div>

    <!-- Create -->
    <div class="create-card">
      <h2>Create New Link</h2>
      <div class="field-group" style="margin:0">
        <label>Destination URL</label>
        <input type="url" id="new-url" placeholder="https://example.com/very/long/url" />
      </div>
      <div class="create-row-2">
        <div class="field-group" style="margin:0">
          <label>Short Code (optional)</label>
          <div class="slug-wrap">
            <span class="slug-prefix" id="slug-prefix-display">…/</span>
            <input type="text" id="new-slug" placeholder="auto" style="border:none;border-radius:0" />
            <button class="dice-btn" onclick="randomizeSlug()" title="Random">🎲</button>
          </div>
        </div>
        <div class="field-group" style="margin:0">
          <label>Label (optional)</label>
          <input type="text" id="new-label" placeholder="e.g. Product launch link" />
        </div>
      </div>
      <div style="margin-top:12px">
        <button class="btn btn-primary" style="width:auto;padding:11px 28px" onclick="createLink()">+ Create Short Link</button>
      </div>
    </div>

    <!-- Links list -->
    <div class="section-header">
      <div class="section-title">Your Links</div>
      <input type="text" class="search-input" placeholder="🔍 Search…" oninput="filterLinks(this.value)" />
    </div>
    <div id="links-container">
      <div class="empty-state"><div class="icon">⏳</div><p>Loading links…</p></div>
    </div>
  </main>
</div>

<!-- Stats Modal -->
<div id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">Click History</h3>
    <div id="modal-body"></div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──
let WORKER = "";
let USERNAME = "";
let PASS = "";
let allLinks = [];

// ── Session ──
function saveSession(w, u, p) {
  localStorage.setItem("lk_worker", w);
  localStorage.setItem("lk_user", u);
  localStorage.setItem("lk_pass", p);
}
function loadSession() {
  return {
    worker: localStorage.getItem("lk_worker") || "",
    user: localStorage.getItem("lk_user") || "",
    pass: localStorage.getItem("lk_pass") || "",
  };
}

// ── Tab switch ──
function switchTab(tab) {
  document.getElementById("tab-login").classList.toggle("active", tab === "login");
  document.getElementById("tab-register").classList.toggle("active", tab === "register");
  document.getElementById("login-fields").style.display = tab === "login" ? "" : "none";
  document.getElementById("register-fields").style.display = tab === "register" ? "" : "none";
  document.getElementById("auth-subtitle").textContent = tab === "login"
    ? "Sign in to manage your short links"
    : "Create a free account";
  document.getElementById("auth-error").textContent = "";
}

// ── Login ──
async function doLogin() {
  let workerUrl = document.getElementById("worker-url-input").value.trim().replace(/\/$/, "");
  const username = document.getElementById("login-username").value.trim().toLowerCase();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("auth-error");

  if (!workerUrl || !username || !password) { errEl.textContent = "All fields are required."; return; }
  if (!workerUrl.startsWith("http")) workerUrl = "https://" + workerUrl;

  errEl.textContent = "Connecting…";

  try {
    const r = await fetch(`${workerUrl}/api/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || "Login failed."; return; }

    WORKER = workerUrl;
    USERNAME = username;
    PASS = password;
    saveSession(WORKER, USERNAME, PASS);
    await startApp();
  } catch (e) {
    errEl.textContent = "Cannot reach Worker. Check the URL and try again.";
  }
}

// ── Register ──
async function doRegister() {
  let workerUrl = document.getElementById("worker-url-input").value.trim().replace(/\/$/, "");
  const username = document.getElementById("reg-username").value.trim().toLowerCase();
  const password = document.getElementById("reg-password").value;
  const password2 = document.getElementById("reg-password2").value;
  const errEl = document.getElementById("auth-error");

  if (!workerUrl || !username || !password) { errEl.textContent = "All fields are required."; return; }
  if (password !== password2) { errEl.textContent = "Passwords do not match."; return; }
  if (!workerUrl.startsWith("http")) workerUrl = "https://" + workerUrl;

  errEl.textContent = "Creating account…";

  try {
    const r = await fetch(`${workerUrl}/api/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || "Registration failed."; return; }

    // Auto-login after register
    WORKER = workerUrl;
    USERNAME = username;
    PASS = password;
    saveSession(WORKER, USERNAME, PASS);
    await startApp();
  } catch (e) {
    errEl.textContent = "Cannot reach Worker. Check the URL and try again.";
  }
}

function logout() {
  localStorage.removeItem("lk_worker");
  localStorage.removeItem("lk_user");
  localStorage.removeItem("lk_pass");
  location.reload();
}

// ── App ──
async function startApp() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "block";

  const baseUrl = `${WORKER}/${USERNAME}`;
  document.getElementById("user-badge").textContent = USERNAME;
  document.getElementById("base-url-display").textContent = baseUrl + "/{slug}";
  document.getElementById("slug-prefix-display").textContent =
    WORKER.replace("https://","").replace("http://","") + `/${USERNAME}/`;

  allLinks = await api("GET", "/api/links");
  renderLinks(allLinks);
  updateStats(allLinks);

  setInterval(refreshLinks, 30000);
}

async function refreshLinks() {
  try {
    allLinks = await api("GET", "/api/links");
    renderLinks(allLinks);
    updateStats(allLinks);
  } catch {}
}

function updateStats(links) {
  document.getElementById("stat-total").textContent = links.length;
  document.getElementById("stat-clicks").textContent =
    links.reduce((s, l) => s + (l.clicks || 0), 0).toLocaleString();
  if (links.length) {
    const latest = [...links].sort((a, b) => b.created - a.created)[0];
    document.getElementById("stat-last").textContent = timeAgo(latest.created);
  } else {
    document.getElementById("stat-last").textContent = "—";
  }
}

// ── API ──
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      "Content-Type": "application/json",
      "X-Admin-Key": PASS,
      "X-Username": USERNAME,
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(WORKER + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.status);
  return data;
}

// ── CRUD ──
async function createLink() {
  const url = document.getElementById("new-url").value.trim();
  const slug = document.getElementById("new-slug").value.trim();
  const label = document.getElementById("new-label").value.trim();
  if (!url) { toast("Enter a destination URL", "error"); return; }
  try {
    const link = await api("POST", "/api/links", { url, slug, label });
    allLinks.unshift(link);
    renderLinks(allLinks);
    updateStats(allLinks);
    document.getElementById("new-url").value = "";
    document.getElementById("new-slug").value = "";
    document.getElementById("new-label").value = "";
    const shortLink = `${WORKER}/${USERNAME}/${link.slug}`;
    toast(`Created! Copied to clipboard.`, "success");
    copyTextSilent(shortLink);
  } catch (e) {
    toast(e.message || "Failed to create", "error");
  }
}

async function deleteLink(slug) {
  if (!confirm(`Delete /${slug}?`)) return;
  try {
    await api("DELETE", `/api/links/${slug}`);
    allLinks = allLinks.filter(l => l.slug !== slug);
    renderLinks(allLinks);
    updateStats(allLinks);
    toast(`Deleted /${slug}`, "success");
  } catch (e) { toast("Failed to delete", "error"); }
}

async function saveEdit(slug) {
  const newUrl = document.getElementById(`edit-url-${slug}`).value.trim();
  if (!newUrl) return;
  try {
    const updated = await api("PUT", `/api/links/${slug}`, { url: newUrl });
    const idx = allLinks.findIndex(l => l.slug === slug);
    if (idx >= 0) allLinks[idx] = { ...allLinks[idx], ...updated };
    renderLinks(allLinks);
    toast("Updated!", "success");
  } catch (e) { toast(e.message || "Failed to update", "error"); }
}

async function showStats(slug) {
  const link = allLinks.find(l => l.slug === slug);
  const totalClicks = link ? (link.clicks || 0) : 0;
  document.getElementById("modal-title").textContent = `/${slug} — Click Statistics`;
  document.getElementById("modal-body").innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;background:#0d2e1a;border-radius:10px;padding:12px 16px;margin-bottom:16px">
      <span style="font-size:24px">👁</span>
      <div>
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600">Total Clicks</div>
        <div style="font-size:28px;font-weight:700;font-family:var(--mono);color:var(--green)">${totalClicks.toLocaleString()}</div>
      </div>
    </div>
    <p style='color:var(--muted);font-size:12px;margin-bottom:10px'>Loading click history…</p>
  `;
  document.getElementById("modal-overlay").classList.add("open");
  try {
    const data = await api("GET", `/api/stats/${slug}`);
    const hist = data.history || [];
    const histHtml = hist.length ? hist.map(h => `
      <div class="click-row">
        <span class="flag">${countryFlag(h.country)}</span>
        <span>${h.country}${h.city ? ` / ${h.city}` : ""}</span>
        <span class="click-time">${timeAgo(h.t)}</span>
      </div>`).join("") : `<p style='color:var(--muted);font-size:13px'>No click history yet.</p>`;
    document.getElementById("modal-body").innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;background:#0d2e1a;border-radius:10px;padding:12px 16px;margin-bottom:16px">
        <span style="font-size:24px">👁</span>
        <div>
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600">Total Clicks</div>
          <div style="font-size:28px;font-weight:700;font-family:var(--mono);color:var(--green)">${totalClicks.toLocaleString()}</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:8px">Recent Clicks</div>
      ${histHtml}
    `;
  } catch {
    document.getElementById("modal-body").innerHTML = "<p style='color:var(--accent2)'>Failed to load stats.</p>";
  }
}

function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); }

// Settings
function toggleSettings() {
  document.getElementById("settings-panel").classList.toggle("open");
}

async function changePassword() {
  const np = document.getElementById("new-pass").value;
  const np2 = document.getElementById("new-pass2").value;
  if (!np) { toast("Enter a new password", "error"); return; }
  if (np !== np2) { toast("Passwords do not match", "error"); return; }
  try {
    await api("POST", "/api/change-password", { newPassword: np });
    PASS = np;
    saveSession(WORKER, USERNAME, PASS);
    toast("Password updated!", "success");
    document.getElementById("new-pass").value = "";
    document.getElementById("new-pass2").value = "";
  } catch (e) { toast(e.message || "Failed", "error"); }
}

// ── Render ──
function renderLinks(links) {
  const c = document.getElementById("links-container");
  if (!links.length) {
    c.innerHTML = `<div class="empty-state"><div class="icon">🔗</div><p>No links yet. Create your first short link above.</p></div>`;
    return;
  }
  const sorted = [...links].sort((a, b) => (b.created || 0) - (a.created || 0));
  c.innerHTML = sorted.map(l => {
    const shortLink = `${WORKER}/${USERNAME}/${l.slug}`;
    return `
    <div class="link-card" id="card-${l.slug}">
      <div class="link-left">
        <div class="link-short">
          <a class="short-code" href="${shortLink}" target="_blank">${shortLink.replace('https://','')}</a>
          <button class="btn btn-sm btn-ghost" style="padding:2px 8px;font-size:11px" onclick="copyShort('${l.slug}')" title="Copy">📋 Copy</button>
          <span class="copy-toast" id="copied-${l.slug}">✓ Copied!</span>
          ${l.label ? `<span class="link-label">${escHtml(l.label)}</span>` : ""}
        </div>
        <div class="link-dest" title="${escHtml(l.url)}">→ ${escHtml(l.url)}</div>
        <div>
          <span class="clicks-badge" onclick="showStats('${l.slug}')" title="View click history">
            👁 ${(l.clicks || 0).toLocaleString()} clicks
          </span>
        </div>
        <div class="edit-mode" id="edit-${l.slug}">
          <div class="edit-mode-label">Change Redirect URL</div>
          <div class="edit-mode-row">
            <input type="url" id="edit-url-${l.slug}" value="${escHtml(l.url)}" placeholder="https://new-destination.com" />
            <button class="btn-clear" onclick="document.getElementById('edit-url-${l.slug}').value='';document.getElementById('edit-url-${l.slug}').focus()">✕ Clear</button>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-primary" onclick="saveEdit('${l.slug}')">💾 Save</button>
            <button class="btn btn-sm btn-ghost" onclick="toggleEdit('${l.slug}')">Cancel</button>
          </div>
        </div>
      </div>
      <div class="link-actions">
        <button class="btn btn-sm btn-ghost" onclick="toggleEdit('${l.slug}')" title="Edit">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteLink('${l.slug}')" title="Delete">🗑</button>
      </div>
    </div>`;
  }).join("");
}

function filterLinks(q) {
  if (!q) { renderLinks(allLinks); return; }
  const lower = q.toLowerCase();
  renderLinks(allLinks.filter(l =>
    l.slug.includes(lower) || l.url.toLowerCase().includes(lower) || (l.label || "").toLowerCase().includes(lower)
  ));
}

function toggleEdit(slug) {
  const el = document.getElementById(`edit-${slug}`);
  const card = document.getElementById(`card-${slug}`);
  const open = el.classList.toggle("open");
  card.classList.toggle("editing", open);
  if (open) document.getElementById(`edit-url-${slug}`).focus();
}

// ── Utils ──
function randomizeSlug() {
  const chars = "abcdefghjkmnpqrstuvwxyz23456789";
  let s = "";
  for (let i = 0; i < 5; i++) s += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById("new-slug").value = s;
}

function copyShort(slug) {
  const shortLink = `${WORKER}/${USERNAME}/${slug}`;
  copyTextSilent(shortLink);
  const el = document.getElementById(`copied-${slug}`);
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

function copyTextSilent(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); ta.remove();
  });
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return "just now";
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  return `${Math.floor(diff / 86400000)}d ago`;
}

function countryFlag(code) {
  if (!code || code === "??") return "🌍";
  try { return code.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1E0 + c.charCodeAt(0) - 65)); }
  catch { return "🌍"; }
}

function escHtml(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

let toastTimer;
function toast(msg, type = "success") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "", 3000);
}

// ── Enter key ──
document.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const loginVisible = document.getElementById("login-fields").style.display !== "none";
    if (document.getElementById("auth-screen").style.display !== "none") {
      loginVisible ? doLogin() : doRegister();
    }
  }
  if (e.key === "Escape") closeModal();
});

// ── Auto-login ──
window.addEventListener("load", async () => {
  const sess = loadSession();
  if (sess.worker && sess.user && sess.pass) {
    document.getElementById("worker-url-input").value = sess.worker;
    document.getElementById("login-username").value = sess.user;
    document.getElementById("login-password").value = sess.pass;
    WORKER = sess.worker;
    USERNAME = sess.user;
    PASS = sess.pass;
    try {
      const r = await fetch(`${WORKER}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: USERNAME, password: PASS })
      });
      if (r.ok) { await startApp(); return; }
    } catch {}
  }
});
</script>
